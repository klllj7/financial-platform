services:
  postgres:
    image: postgres:17
    container_name: financial-platform-postgres
    restart: always
    ports:
      # 내 컴퓨터 5432 포트와 컨테이너 PostgreSQL 5432 포트를 연결
      - "5432:5432"
    environment:
      # PostgreSQL 기본 관리자 계정
      POSTGRES_USER: postgres

      # PostgreSQL 접속 비밀번호
      POSTGRES_PASSWORD: postgres1234

      # 처음 컨테이너 생성 시 자동으로 만들 DB 이름
      POSTGRES_DB: financial_platform
    volumes:
      # 컨테이너를 껐다 켜도 DB 데이터가 유지되도록 볼륨 연결
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: